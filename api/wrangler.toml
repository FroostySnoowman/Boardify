name = "boardify-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ALLOWED_ORIGINS = "https://boardify.mybreakpoint.app,https://api.boardify.mybreakpoint.app"

[[d1_databases]]
binding = "DB"
database_name = "boardify-db"
database_id = "5e4ffed1-8eb4-4f01-8f24-b4f133ce5b9f"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "boardify-images"

[[durable_objects.bindings]]
name = "BOARD_ROOM"
class_name = "BoardRoom"

[[migrations]]
tag = "board-room-v1"
new_sqlite_classes = ["BoardRoom"]

[dev]
port = 8787

[env.dev]
name = "boardify-api-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "boardify-db-dev"
database_id = "09878efd-d7c2-4b96-96f6-b373321d4e14"

[[env.dev.r2_buckets]]
binding = "IMAGES"
bucket_name = "boardify-images-dev"

[[env.dev.durable_objects.bindings]]
name = "BOARD_ROOM"
class_name = "BoardRoom"

[env.production]
name = "boardify-api"

[[env.production.d1_databases]]
binding = "DB"
database_name = "boardify-db"
database_id = "5e4ffed1-8eb4-4f01-8f24-b4f133ce5b9f"

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "boardify-images"

[[env.production.durable_objects.bindings]]
name = "BOARD_ROOM"
class_name = "BoardRoom"
