[[durable_objects.bindings]]
name = "MATCH_SPECTATE"
class_name = "MatchSpectate"
script_name = "api-dev"

[[durable_objects.bindings]]
name = "LIVE_MATCHES_LIST"
class_name = "LiveMatchesList"
script_name = "api-dev"

[[durable_objects.bindings]]
name = "MESSAGE_WS"
class_name = "MessageWebSocket"
script_name = "api-dev"

